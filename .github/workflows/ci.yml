name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      # Lint is informational for now (the codebase predates linting). Flip to a
      # blocking step once `npm run lint` is clean.
      - run: npm run lint
        continue-on-error: true
